name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  isolation:
    name: core/ isolation check (no imports from signals/)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: chmod +x scripts/check-core-isolation.sh
      - run: ./scripts/check-core-isolation.sh

  ui-typecheck:
    name: approval-ui typecheck + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/approval-ui
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: services/approval-ui/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      # `next build` catches a class of issues `tsc --noEmit` doesn't:
      # typedRoutes mismatches, page-data collection invoking module load,
      # stricter end-to-end import resolution. Two such bugs slipped past
      # typecheck in A.2 and were caught only on a local `pnpm build` —
      # this step closes that gap at PR time.
      - name: Build (server)
        env:
          # Build-time deps (none currently — DB/WorkOS are lazy). If a
          # future surface needs a build-time secret we plumb it here.
          NODE_ENV: production
        run: pnpm build

  python-lint:
    name: python services lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [agent-crewai, agent-langgraph, pii-detection, output-moderation, voice-scorer, percentile-predictor, bandit-orchestrator, performance-ingest]
    defaults:
      run:
        working-directory: services/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: uv sync --extra dev   # ruff + mypy + pytest live under [project.optional-dependencies].dev
      - run: uv run ruff check .
      - run: uv run mypy . || true  # advisory until type coverage matures

  docker-compose-validate:
    name: docker-compose config validates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose config --quiet
