name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  isolation:
    name: core/ isolation check (no imports from signals/)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: chmod +x scripts/check-core-isolation.sh
      - run: ./scripts/check-core-isolation.sh

  ui-typecheck:
    name: approval-ui typecheck + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/approval-ui
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: services/approval-ui/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      # `next build` catches a class of issues `tsc --noEmit` doesn't:
      # typedRoutes mismatches, page-data collection invoking module load,
      # stricter end-to-end import resolution. Two such bugs slipped past
      # typecheck in A.2 and were caught only on a local `pnpm build` —
      # this step closes that gap at PR time.
      - name: Build (server)
        env:
          # Build-time deps (none currently — DB/WorkOS are lazy). If a
          # future surface needs a build-time secret we plumb it here.
          NODE_ENV: production
        run: pnpm build

  python-lint:
    name: python services lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [agent-crewai, agent-langgraph, pii-detection, output-moderation, voice-scorer, percentile-predictor, bandit-orchestrator, performance-ingest]
    defaults:
      run:
        working-directory: services/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: uv sync --extra dev   # ruff + mypy + pytest live under [project.optional-dependencies].dev
      - run: uv run ruff check .
      - run: uv run mypy . || true  # advisory until type coverage matures

  docker-compose-validate:
    name: docker-compose config validates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose config --quiet

  rls-integration:
    # DoD A.1.1 — applies migrations 0001..0007 against an ephemeral Postgres,
    # then runs cross-tenant-rls.sql which asserts:
    #   1. No-tenant session sees zero rows (fail-closed default).
    #   2. Tenant-A context sees A's rows; cross-tenant reads return 0.
    #   3. Cross-tenant INSERT denied by RLS WITH CHECK.
    #   4. Switching app.current_company_id flips visibility.
    #   5. include_client_children flag widens reads to nested tenants
    #      ONLY when set (proves opt-in semantics).
    #   6. pgvector extension present + 384-d vector roundtrips through
    #      company_lessons.embedding + cosine self-distance ≈ 0.
    #
    # Catches the bug class typecheck/build/ruff don't:
    #   - RLS policy regression (cross-tenant data leak)
    #   - pgvector extension missing in the deploy target
    #   - vector(384) column type or dim drift
    name: cross-tenant RLS integration
    runs-on: ubuntu-latest
    services:
      postgres:
        # postgres:16 (Debian) + apt-installed postgresql-16-pgvector lands
        # the extension reliably. The pgvector/pgvector:pg16 image was tried
        # first; its .control files weren't visible in GH Actions service
        # containers (extension reported "not available" by CREATE EXTENSION).
        # Debian + apt is the boring-but-works path.
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        # Healthcheck — workflow steps don't run until pg_isready returns 0.
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - name: Install psql client
        run: sudo apt-get install -y --no-install-recommends postgresql-client
      - name: Install pgvector in service container
        # The service container starts from postgres:16 without pgvector.
        # apt-installs postgresql-16-pgvector + verifies the .control file
        # is now visible via pg_available_extensions. CREATE EXTENSION at
        # migration time picks it up; no postgres restart needed (pgvector
        # doesn't require shared_preload_libraries).
        run: |
          docker exec --user root ${{ job.services.postgres.id }} bash -c "
            apt-get update >/dev/null
            apt-get install -y --no-install-recommends postgresql-16-pgvector
          "
          PGPASSWORD=postgres psql -h localhost -U postgres -d postgres \
            -tAc "SELECT name FROM pg_available_extensions WHERE name='vector';" \
            | grep -q '^vector$' \
            || { echo "pgvector not available after install"; exit 1; }
      - name: Run cross-tenant RLS test
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: postgres
          PGPASSWORD: postgres
          PGDATABASE: clipstack_test
        run: |
          chmod +x tests/integration/run-rls-test.sh
          ./tests/integration/run-rls-test.sh

  playwright-e2e:
    # Page-level E2E for the approval-ui Mission Control + sibling routes.
    # Brings up a real Postgres + applies migrations + runs the seed-demo
    # script so AUTH_STUB resolves to the seeded "Demo Workspace" tenant
    # and every page renders against deterministic data.
    #
    # Catches the bug class typecheck/build/ruff don't:
    #   - server-component query errors that only surface at render time
    #   - route-level redirects, 404s, and approval-form regressions
    #   - the /api/health/services aggregator's envelope shape
    name: playwright e2e
    runs-on: ubuntu-latest
    services:
      postgres:
        # Same image + pgvector install path as the rls-integration job —
        # postgres:16 (Debian) + apt-installed postgresql-16-pgvector. The
        # pgvector/pgvector image's .control file isn't visible to the
        # service container in GH Actions, so the boring path wins.
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: clipstack
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: services/approval-ui/pnpm-lock.yaml
      - name: Install psql + pgvector
        run: |
          sudo apt-get install -y --no-install-recommends postgresql-client
          docker exec --user root ${{ job.services.postgres.id }} bash -c "
            apt-get update >/dev/null
            apt-get install -y --no-install-recommends postgresql-16-pgvector
          "
      - name: Apply migrations in lexical order
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: postgres
          PGPASSWORD: postgres
          PGDATABASE: clipstack
        run: |
          # Apply every migration in numeric order. The seed expects all
          # 7 to be present (companies + RLS + RBAC trigger + post_metrics
          # + content_claims + draft_revisions + vector embedding column).
          for mig in services/shared/db/migrations/*.sql; do
            echo "applying $(basename "$mig")"
            psql -h "$PGHOST" -p "$PGPORT" -U "$PGUSER" -d "$PGDATABASE" \
              -v ON_ERROR_STOP=1 -f "$mig"
          done
      - name: Install approval-ui deps
        working-directory: services/approval-ui
        run: pnpm install --frozen-lockfile
      - name: Run seed
        working-directory: services/approval-ui
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/clipstack
        run: pnpm exec tsx scripts/seed-demo.ts
      - name: Install Playwright chromium
        working-directory: services/approval-ui
        run: pnpm exec playwright install --with-deps chromium
      - name: Run E2E tests
        working-directory: services/approval-ui
        env:
          # Random session secrets per run. AUTH_STUB IDs match the seeded
          # singleton company + user UUIDs so the session resolves the
          # seeded tenant without WorkOS. Both PASSWORD + SECRET env names
          # are exported because dev-setup.sh writes one and session.ts
          # reads the other; covering both names keeps CI working
          # regardless of which side eventually converges.
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/clipstack
          AUTH_STUB_USER_ID: "00000000-0000-0000-0000-000000000002"
          AUTH_STUB_COMPANY_ID: "00000000-0000-0000-0000-000000000001"
          NODE_ENV: development
          CI: "true"
        run: |
          SESSION_PWD="$(openssl rand -base64 48 | tr -d '=+/' | cut -c1-64)"
          export SESSION_COOKIE_PASSWORD="$SESSION_PWD"
          export SESSION_COOKIE_SECRET="$SESSION_PWD"
          pnpm exec playwright test
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: services/approval-ui/playwright-report/
          retention-days: 7

  agent-service-tests:
    # First-pass pytest coverage for the orchestration brain. Each service has
    # its own tests/ tree (offline-stub mode — no Postgres / Redpanda / Qdrant /
    # Ollama required). Catches the bug class lint + typecheck miss: input-
    # schema regressions on the CrewAI tools, graph topology drift on the
    # LangGraph publish pipeline, FastAPI route shape changes.
    name: agent service tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [agent-crewai, agent-langgraph]
    defaults:
      run:
        working-directory: services/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: uv sync --extra dev
      - run: uv run pytest tests/ -v
