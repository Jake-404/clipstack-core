name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  isolation:
    name: core/ isolation check (no imports from signals/)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: chmod +x scripts/check-core-isolation.sh
      - run: ./scripts/check-core-isolation.sh

  ui-typecheck:
    name: approval-ui typecheck + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/approval-ui
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: services/approval-ui/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      # `next build` catches a class of issues `tsc --noEmit` doesn't:
      # typedRoutes mismatches, page-data collection invoking module load,
      # stricter end-to-end import resolution. Two such bugs slipped past
      # typecheck in A.2 and were caught only on a local `pnpm build` —
      # this step closes that gap at PR time.
      - name: Build (server)
        env:
          # Build-time deps (none currently — DB/WorkOS are lazy). If a
          # future surface needs a build-time secret we plumb it here.
          NODE_ENV: production
        run: pnpm build

  python-lint:
    name: python services lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [agent-crewai, agent-langgraph, pii-detection, output-moderation, voice-scorer, percentile-predictor, bandit-orchestrator, performance-ingest]
    defaults:
      run:
        working-directory: services/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: uv sync --extra dev   # ruff + mypy + pytest live under [project.optional-dependencies].dev
      - run: uv run ruff check .
      - run: uv run mypy . || true  # advisory until type coverage matures

  docker-compose-validate:
    name: docker-compose config validates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose config --quiet

  rls-integration:
    # DoD A.1.1 — applies migrations 0001..0006 against an ephemeral
    # Postgres, then runs cross-tenant-rls.sql which asserts:
    #   1. No-tenant session sees zero rows (fail-closed default).
    #   2. Tenant-A context sees A's rows; cross-tenant reads return 0.
    #   3. Cross-tenant INSERT denied by RLS WITH CHECK.
    #   4. Switching app.current_company_id flips visibility.
    #   5. include_client_children flag widens reads to nested tenants
    #      ONLY when set (proves opt-in semantics).
    #
    # Catches the bug class typecheck/build/ruff don't: an RLS policy
    # regression that allows a session to read or write across tenants.
    name: cross-tenant RLS integration
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        # Healthcheck — workflow steps don't run until pg_isready returns 0.
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - name: Install psql client
        run: sudo apt-get install -y --no-install-recommends postgresql-client
      - name: Run cross-tenant RLS test
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: postgres
          PGPASSWORD: postgres
          PGDATABASE: clipstack_test
        run: |
          chmod +x tests/integration/run-rls-test.sh
          ./tests/integration/run-rls-test.sh
