# Clipstack Core — full local stack
#
# Per Doc 1 §4 + §5 of the build spec. Brings up:
#   - postgres        : tenant data + n8n metadata + langfuse metadata
#   - qdrant          : vector store (lessons, voice corpus, asset embeddings)
#   - redpanda        : Kafka-compatible event bus (9 named topics close L1-L12)
#   - langfuse        : self-hosted tracing + observability
#   - litellm         : unified model router (named profiles in models.py)
#   - n8n             : workflow orchestrator
#   - ollama          : local-model adapter for PII-safe paths
#   - traefik         : reverse proxy + TLS termination
#
# Health checks on every service. Run `docker compose ps` to confirm green.
# Feature-flag CRYPTO_ENABLED / EVENTBUS_ENABLED / BANDITS_ENABLED stay orthogonal —
# the platform must run end-to-end with all of them disabled.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-clipstack}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-clipstack}
      POSTGRES_DB:       ${POSTGRES_DB:-clipstack}
    ports: ['5432:5432']
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-clipstack}']
      interval: 10s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.11.3
    restart: unless-stopped
    ports: ['6333:6333', '6334:6334']
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ['CMD-SHELL', 'bash -c "echo > /dev/tcp/localhost/6333" || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5

  # Redpanda single-binary Kafka-compatible broker.
  # Topics auto-created by services/agent-crewai on first publish.
  redpanda:
    image: redpandadata/redpanda:v24.2.7
    restart: unless-stopped
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=512M
      - --reserve-memory=0M
      - --overprovisioned
      - --node-id=0
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:9092
      - --pandaproxy-addr=0.0.0.0:8082
      - --advertise-pandaproxy-addr=redpanda:8082
      - --rpc-addr=0.0.0.0:33145
      - --advertise-rpc-addr=redpanda:33145
    ports: ['9092:9092', '8082:8082']
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    healthcheck:
      test: ['CMD-SHELL', 'rpk cluster health -X brokers=localhost:9092 | grep -q "Healthy:.*true"']
      interval: 15s
      timeout: 5s
      retries: 10

  langfuse:
    image: langfuse/langfuse:2
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
    environment:
      DATABASE_URL:    postgresql://${POSTGRES_USER:-clipstack}:${POSTGRES_PASSWORD:-clipstack}@postgres:5432/${POSTGRES_DB:-clipstack}
      NEXTAUTH_URL:    http://localhost:3030
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET:-dev-only-secret-change-me}
      SALT:            ${LANGFUSE_SALT:-dev-only-salt-change-me}
      TELEMETRY_ENABLED: 'false'
      LANGFUSE_INIT_ORG_ID:    clipstack
      LANGFUSE_INIT_PROJECT_ID: clipstack-dev
      LANGFUSE_INIT_USER_EMAIL: dev@clipstack.local
      LANGFUSE_INIT_USER_PASSWORD: ${LANGFUSE_INIT_USER_PASSWORD:-clipstack-dev}
    ports: ['3030:3000']
    healthcheck:
      test: ['CMD-SHELL', 'wget -q --spider http://localhost:3000/api/public/health || exit 1']
      interval: 15s
      timeout: 5s
      retries: 10

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    restart: unless-stopped
    command: ['--config', '/app/config.yaml', '--port', '4000', '--num_workers', '2']
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-clipstack-dev}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY:    ${OPENAI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
    volumes:
      - ./infra/litellm/config.yaml:/app/config.yaml:ro
    ports: ['4000:4000']
    healthcheck:
      test: ['CMD-SHELL', 'wget -q --spider http://localhost:4000/health || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5

  n8n:
    image: n8nio/n8n:1.66.0
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: '5432'
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB:-clipstack}
      DB_POSTGRESDB_USER:     ${POSTGRES_USER:-clipstack}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD:-clipstack}
      DB_POSTGRESDB_SCHEMA: n8n
      N8N_HOST: localhost
      N8N_PORT: '5678'
      N8N_PROTOCOL: http
      WEBHOOK_URL: http://localhost:5678/
      GENERIC_TIMEZONE: UTC
      N8N_RUNNERS_ENABLED: 'true'
      N8N_DIAGNOSTICS_ENABLED: 'false'
      N8N_PERSONALIZATION_ENABLED: 'false'
      N8N_VERSION_NOTIFICATIONS_ENABLED: 'false'
    ports: ['5678:5678']
    volumes:
      - n8n_data:/home/node/.n8n
      - ./infra/n8n-workflows:/n8n-workflows:ro
    healthcheck:
      test: ['CMD-SHELL', 'wget -q --spider http://localhost:5678/healthz || exit 1']
      interval: 15s
      timeout: 5s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    ports: ['11434:11434']
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ['CMD-SHELL', 'ollama list >/dev/null 2>&1 || exit 1']
      interval: 30s
      timeout: 5s
      retries: 5

  traefik:
    image: traefik:v3.1
    restart: unless-stopped
    command:
      - --api.insecure=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
    ports: ['80:80', '443:443', '8080:8080']
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    healthcheck:
      test: ['CMD-SHELL', 'wget -q --spider http://localhost:8080/api/version || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
  qdrant_data:
  redpanda_data:
  n8n_data:
  ollama_data:
